# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.
COMMON_FLAGS="-march=x86-64-v3 -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
RUSTFLAGS="${RUSTFLAGS} -C target-cpu=x86-64-v3"

USE="-systemd hardened apparmor modules-sign secureboot dist-kernel networkmanager bluetooth elogind eme-free -proprietary-codecs -telemetry"

MODULES_SIGN_KEY="/usr/src/linux-x.y.z/certs/kernel_key.pem"
MODULES_SIGN_CERT="/usr/src/linux-x.y.z/certs/kernel_key.pem"
SECUREBOOT_SIGN_KEY="/usr/src/linux-x.y.z/certs/kernel_key.pem"
SECUREBOOT_SIGN_CERT="/usr/src/linux-x.y.z/certs/kernel_key.pem"

MAKEOPTS="-j8"

ACCEPT_LICENSE="-* @FREE"

# NOTE: This stage was built with the bindist USE flag enabled

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C.UTF-8
